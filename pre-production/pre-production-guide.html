<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Production Guide — Tokyo in Film</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css?v=8">
    <style>
        .scenario-wrapper { max-width: 780px; margin: 0 auto; }

        .scenario-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-top: 3px solid var(--accent-neon-pink);
            border-radius: var(--radius-md);
            padding: 2.5rem;
            min-height: 280px;
        }

        .scenario-tag {
            font-family: var(--font-heading);
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent-neon-pink);
            margin-bottom: 1.25rem;
        }

        .scenario-body { font-size: 1rem; line-height: 1.8; color: #ccc; margin-bottom: 1.75rem; }
        .scenario-body p { margin-bottom: 1rem; }

        .scenario-video-wrap {
            position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
        }
        .scenario-video-wrap iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:0; }

        .scenario-question {
            font-size: 1.05rem; font-weight: 600; color: #fff;
            line-height: 1.65; margin-bottom: 1.5rem;
        }

        .roles-list { margin-bottom: 1.5rem; }
        .roles-list .role-block {
            border-left: 2px solid var(--accent-neon-cyan);
            padding: 0.6rem 1rem;
            margin-bottom: 0.75rem;
            background: rgba(0,243,255,0.03);
        }
        .roles-list .role-title {
            font-family: var(--font-heading);
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent-neon-cyan);
            margin-bottom: 0.25rem;
        }
        .roles-list .role-desc { font-size: 0.88rem; color: #bbb; line-height: 1.6; }
        .roles-list .role-support { font-size: 0.82rem; color: #888; font-style: italic; margin-top: 0.25rem; }

        .choices { display: flex; flex-direction: column; gap: 0.65rem; }

        .choice-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: #ccc;
            padding: 0.9rem 1.25rem;
            text-align: left;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.95rem;
            line-height: 1.5;
            border-radius: 4px;
            transition: border-color 0.25s, color 0.25s, background 0.25s;
        }
        .choice-btn:hover { border-color: var(--accent-neon-cyan); color: var(--accent-neon-cyan); background: rgba(0,243,255,0.05); }
        .choice-btn.selected { border-color: var(--accent-neon-cyan); color: #fff; background: rgba(0,243,255,0.08); }

        .feedback-box {
            display: none;
            background: rgba(0,243,255,0.06);
            border: 1px solid rgba(0,243,255,0.3);
            border-radius: 4px;
            padding: 1rem 1.25rem;
            margin-top: 1.25rem;
            font-size: 0.9rem;
            color: #bbb;
            line-height: 1.7;
        }
        .feedback-box.visible { display: block; }

        .proceed-btn {
            display: inline-block; margin-top: 1.5rem;
            padding: 0.7rem 2rem;
            background: transparent;
            border: 1px solid var(--accent-neon-pink);
            color: var(--accent-neon-pink);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-family: var(--font-heading);
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .proceed-btn:hover { background: var(--accent-neon-pink); color: #000; }

        .end-screen { text-align: center; padding: 2rem 0; }
        .end-screen h3 { color: var(--accent-neon-cyan); font-size: 1.5rem; margin-bottom: 1rem; }
        .end-screen p { color: #bbb; margin-bottom: 2rem; }

        .restart-btn {
            margin-top: 1.5rem; display: inline-block;
            background: transparent; border: 1px solid #444;
            color: #666; padding: 0.5rem 1.5rem; cursor: pointer;
            font-family: var(--font-heading); font-size: 0.68rem;
            letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.3s;
        }
        .restart-btn:hover { border-color: #888; color: #888; }

        .scenario-breadcrumb {
            font-family: var(--font-heading); font-size: 0.62rem;
            letter-spacing: 0.12em; color: #555;
            margin-bottom: 1rem; min-height: 1.2em;
        }
        .scenario-breadcrumb span { color: var(--accent-neon-pink); }
    </style>
</head>
<body>

    <main class="container">
        <div class="intro" style="text-align:center; margin-bottom:2.5rem;">
            <h2>Pre-Production Decision Making Guide</h2>
            <p>Work through this interactive scenario to plan your film project step by step.</p>
        </div>
        <div class="scenario-wrapper">
            <div id="breadcrumb" class="scenario-breadcrumb"></div>
            <div id="scenario-card" class="scenario-card"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Tokyo in Film.</p>
    </footer>

    <script>
    const ROLES_HTML = `
        <div class="roles-list">
            <div class="role-block">
                <div class="role-title">Screenwriter</div>
                <div class="role-desc">Drafts the script, focusing on creating strong dialogue and a clear narrative. The script should give everyone a roadmap for the story, characters, and tone.</div>
                <div class="role-support">Support Role: Act as a Script Consultant for another team, offering feedback on dialogue or structure to strengthen their narrative.</div>
            </div>
            <div class="role-block">
                <div class="role-title">Director</div>
                <div class="role-desc">Guides the team to align with the film's vision. Develops storyboards, leads discussions on style, and ensures that each team member's work aligns with the intended mood.</div>
                <div class="role-support">Support Role: Spend time as a Production Assistant for another team, observing and learning from other directors' styles, which could inspire your own approach.</div>
            </div>
            <div class="role-block">
                <div class="role-title">Cinematographer</div>
                <div class="role-desc">Collaborates with the director to create a shot list that specifies lighting, framing, and camera movement. Each shot should visually communicate the story's mood and style.</div>
                <div class="role-support">Support Role: Serve as a Camera Operator for another team to expand your skills in framing, lighting, and movement under different directing styles.</div>
            </div>
            <div class="role-block">
                <div class="role-title">Production Designer</div>
                <div class="role-desc">Creates the look and feel of the setting, selecting props, costumes, and locations that bring the story's world to life. Uses a mood board to share ideas with the team.</div>
                <div class="role-support">Support Role: Help another team as a Set Dresser, assisting them with props and set elements. You'll learn how to adjust visual details to enhance storytelling.</div>
            </div>
            <div class="role-block">
                <div class="role-title">Editor</div>
                <div class="role-desc">Plans a post-production workflow, organizes file naming conventions, and prepares templates for later editing stages.</div>
                <div class="role-support">Support Role: Act as an Editing Assistant for another team, helping them organize their footage and learn different approaches to creating a rough cut.</div>
            </div>
        </div>`;

    const NODES = {
        0: {
            type: 'text',
            tag: 'Introduction',
            content: `<p>You're about to recreate a scene from one of the films we've analyzed in class. Each choice you make—from location to lighting—will shape the scene's impact. This scenario will help you think through key creative and logistical decisions.</p>`,
            next: 2
        },
        2: {
            type: 'branch',
            tag: 'Choose Your Path',
            question: 'Is your film group recreating an existing scene or creating a new scene inspired by one of the analyzed films, or a new creative short film, i.e. a documentary?',
            choices: [
                { text: 'Recreate a Scene', next: 5 },
                { text: 'Create a New Scene (Inspired)', next: 6 },
                { text: 'Create a New Scene (Creative)', next: 7 }
            ]
        },
        5:  { type: 'video', tag: 'Planning', title: 'Thinking about filming; Plan ahead!', videoId: '9tpJkxUW6tI', next: 1 },
        6:  { type: 'video', tag: 'Planning', title: 'Thinking about filming; Plan ahead!', videoId: '9tpJkxUW6tI', next: 3 },
        7:  { type: 'video', tag: 'Planning', title: 'Thinking about filming; Plan ahead!', videoId: '9tpJkxUW6tI', next: 4 },
        1: {
            type: 'branch',
            tag: 'Selecting the Filming Location',
            question: 'You need to choose a filming location that closely matches or adapts the original setting of your scene. Which option best reflects the look and feel of the original?',
            choices: [
                { text: 'Authentic Location Match', next: 8, feedback: 'This location will bring authentic Tokyo energy to your scene, but it may require permits and extra time to manage crowds.' },
                { text: 'Adapted Location', next: 9, feedback: 'A quieter street keeps the urban feel while simplifying logistics, though it may lose the intensity of the original setting.' }
            ]
        },
        3: {
            type: 'branch',
            tag: 'Selecting the Filming Location',
            question: 'You need to choose a filming location that closely matches or adapts the original setting of your scene. Which option best reflects the look and feel of the original?',
            choices: [
                { text: 'Recreate a Scene', next: 10, feedback: 'Students choosing this option will aim to replicate a specific scene as accurately as possible, paying close attention to the original\'s style, setting, and tone.' },
                { text: 'Adapted Location', next: 11, feedback: 'A quieter street keeps the urban feel while simplifying logistics, though it may lose the intensity of the original setting.' },
                { text: 'Studio or Controlled Setting', next: 12 }
            ]
        },
        4: {
            type: 'branch',
            tag: 'Selecting the Filming Location',
            question: 'You need to choose a filming location that closely matches or adapts the original setting of your scene. Which option best reflects the look and feel of the original?',
            choices: [
                { text: 'Adapted Location', next: 13, feedback: 'A quieter street keeps the urban feel while simplifying logistics, though it may lose the intensity of the original setting.' },
                { text: 'Studio or Controlled Setting', next: 14 }
            ]
        },
        8:  { type: 'video', tag: 'Elements of a Scene', title: 'Elements of a Scene', videoId: 'MJVoJfnUSOA', next: 16 },
        9:  { type: 'video', tag: 'Elements of a Scene', title: 'Elements of a Scene', videoId: 'MJVoJfnUSOA', next: 18 },
        10: { type: 'video', tag: 'Elements of a Scene', title: 'Elements of a Scene', videoId: 'MJVoJfnUSOA', next: 19 },
        11: { type: 'video', tag: 'Elements of a Scene', title: 'Elements of a Scene', videoId: 'MJVoJfnUSOA', next: 20 },
        12: { type: 'video', tag: 'Elements of a Scene', title: 'Elements of a Scene', videoId: 'MJVoJfnUSOA', next: 21 },
        13: { type: 'video', tag: 'Elements of a Scene', title: 'Elements of a Scene', videoId: 'MJVoJfnUSOA', next: 22 },
        14: { type: 'video', tag: 'Elements of a Scene', title: 'Elements of a Scene', videoId: 'MJVoJfnUSOA', next: 23 },
        16: { type: 'branch', tag: 'Pre-Production Concerns', question: 'Have you considered some of the elements of your project that may need to start preparing for now, in pre-production?', choices: [ { text: 'Yes.', next: 17 }, { text: 'No — revisit the video.', next: 8 } ] },
        18: { type: 'branch', tag: 'Pre-Production Concerns', question: 'Have you considered some of the elements of your project that may need to start preparing for now, in pre-production?', choices: [ { text: 'Yes.', next: 24 }, { text: 'No — revisit the video.', next: 9 } ] },
        19: { type: 'branch', tag: 'Pre-Production Concerns', question: 'Have you considered some of the elements of your project that may need to start preparing for now, in pre-production?', choices: [ { text: 'Yes.', next: 25 }, { text: 'No — revisit the video.', next: 10 } ] },
        20: { type: 'branch', tag: 'Pre-Production Concerns', question: 'Have you considered some of the elements of your project that may need to start preparing for now, in pre-production?', choices: [ { text: 'Yes.', next: 26 }, { text: 'No — revisit the video.', next: 11 } ] },
        21: { type: 'branch', tag: 'Pre-Production Concerns', question: 'Have you considered some of the elements of your project that may need to start preparing for now, in pre-production?', choices: [ { text: 'Yes.', next: 27 }, { text: 'No — revisit the video.', next: 12 } ] },
        22: { type: 'branch', tag: 'Pre-Production Concerns', question: 'Have you considered some of the elements of your project that may need to start preparing for now, in pre-production?', choices: [ { text: 'Yes.', next: 28 }, { text: 'No — revisit the video.', next: 13 } ] },
        23: { type: 'branch', tag: 'Pre-Production Concerns', question: 'Have you considered some of the elements of your project that may need to start preparing for now, in pre-production?', choices: [ { text: 'Yes.', next: 29 }, { text: 'No — revisit the video.', next: 14 } ] },
        17: { type: 'video', tag: 'Team Work', title: 'Team Work Makes the Dream Work', videoId: 'hFFopPPrGiE', videoStart: 184, next: 15 },
        24: { type: 'video', tag: 'Team Work', title: 'Team Work Makes the Dream Work', videoId: 'hFFopPPrGiE', videoStart: 184, next: 31 },
        25: { type: 'video', tag: 'Team Work', title: 'Team Work Makes the Dream Work', videoId: 'hFFopPPrGiE', videoStart: 184, next: 32 },
        26: { type: 'video', tag: 'Team Work', title: 'Team Work Makes the Dream Work', videoId: 'hFFopPPrGiE', videoStart: 184, next: 33 },
        27: { type: 'video', tag: 'Team Work', title: 'Team Work Makes the Dream Work', videoId: 'hFFopPPrGiE', videoStart: 184, next: 34 },
        28: { type: 'video', tag: 'Team Work', title: 'Team Work Makes the Dream Work', videoId: 'hFFopPPrGiE', videoStart: 184, next: 35 },
        29: { type: 'video', tag: 'Team Work', title: 'Team Work Makes the Dream Work', videoId: 'hFFopPPrGiE', videoStart: 184, next: 36 },
        15: { type: 'roles', tag: 'Establishing Team Roles', choices: [ { text: 'Yes — roles are established.', next: 30 }, { text: 'No — revisit the video.', next: 17 } ] },
        31: { type: 'roles', tag: 'Establishing Team Roles', choices: [ { text: 'Yes — roles are established.', next: 37 }, { text: 'No — revisit the video.', next: 24 } ] },
        32: { type: 'roles', tag: 'Establishing Team Roles', choices: [ { text: 'Yes — roles are established.', next: 38 }, { text: 'No — revisit the video.', next: 25 } ] },
        33: { type: 'roles', tag: 'Establishing Team Roles', choices: [ { text: 'Yes — roles are established.', next: 39 }, { text: 'No — revisit the video.', next: 26 } ] },
        34: { type: 'roles', tag: 'Establishing Team Roles', choices: [ { text: 'Yes — roles are established.', next: 40 }, { text: 'No — revisit the video.', next: 27 } ] },
        35: { type: 'roles', tag: 'Establishing Team Roles', choices: [ { text: 'Yes — roles are established.', next: 41 }, { text: 'No — revisit the video.', next: 28 } ] },
        36: { type: 'roles', tag: 'Establishing Team Roles', choices: [ { text: 'Yes — roles are established.', next: 42 }, { text: 'No — revisit the video.', next: 29 } ] },
        30: { type: 'form' }, 37: { type: 'form' }, 38: { type: 'form' },
        39: { type: 'form' }, 40: { type: 'form' }, 41: { type: 'form' }, 42: { type: 'form' }
    };

    let currentNodeId = 0;
    let pendingNext = null;
    const card = document.getElementById('scenario-card');
    const breadcrumb = document.getElementById('breadcrumb');
    const pathTaken = [];

    function render(nodeId) {
        currentNodeId = nodeId;
        pendingNext = null;
        const node = NODES[nodeId];
        if (!node) return;

        if (node.tag && !pathTaken.includes(node.tag)) pathTaken.push(node.tag);
        breadcrumb.innerHTML = pathTaken.map((s, i) =>
            i === pathTaken.length - 1 ? `<span>${s}</span>` : s
        ).join(' &rsaquo; ');

        card.innerHTML = '';
        const tag = document.createElement('div');
        tag.className = 'scenario-tag';
        tag.textContent = node.tag || '';
        card.appendChild(tag);

        if (node.type === 'text') {
            const body = document.createElement('div');
            body.className = 'scenario-body';
            body.innerHTML = node.content;
            card.appendChild(body);
            card.appendChild(makeProceeds(node.next));
        }

        else if (node.type === 'video') {
            const title = document.createElement('div');
            title.className = 'scenario-question';
            title.textContent = node.title;
            card.appendChild(title);
            const wrap = document.createElement('div');
            wrap.className = 'scenario-video-wrap';
            const start = node.videoStart ? `&start=${node.videoStart}` : '';
            wrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${node.videoId}?rel=0${start}" allowfullscreen title="${node.title}"></iframe>`;
            card.appendChild(wrap);
            card.appendChild(makeProceeds(node.next));
        }

        else if (node.type === 'branch') {
            const q = document.createElement('div');
            q.className = 'scenario-question';
            q.textContent = node.question;
            card.appendChild(q);
            const feedback = document.createElement('div');
            feedback.className = 'feedback-box';
            card.appendChild(feedback);
            const choices = document.createElement('div');
            choices.className = 'choices';
            node.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice.text;
                btn.addEventListener('click', () => {
                    card.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    pendingNext = choice.next;
                    if (choice.feedback) {
                        feedback.textContent = choice.feedback;
                        feedback.classList.add('visible');
                    } else {
                        feedback.classList.remove('visible');
                    }
                    const existing = card.querySelector('.proceed-btn');
                    if (!existing) card.appendChild(makeProceeds(null));
                    card.querySelector('.proceed-btn').onclick = () => render(pendingNext);
                });
                choices.appendChild(btn);
            });
            card.appendChild(choices);
        }

        else if (node.type === 'roles') {
            const q = document.createElement('div');
            q.className = 'scenario-question';
            q.textContent = 'Have you clearly established and agreed upon the responsibilities as it pertains to the following roles?';
            card.appendChild(q);
            const roles = document.createElement('div');
            roles.innerHTML = ROLES_HTML;
            card.appendChild(roles);
            const choices = document.createElement('div');
            choices.className = 'choices';
            node.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice.text;
                btn.addEventListener('click', () => render(choice.next));
                choices.appendChild(btn);
            });
            card.appendChild(choices);
        }

        else if (node.type === 'form') {
            card.innerHTML = `
                <div class="end-screen">
                    <h3>You're Ready.</h3>
                    <p>Please ensure your group fills out the Pre-Production Form to finalize your plans.</p>
                    <a href="https://docs.google.com/forms/d/1y7fgcJaJPhJ70Rje1-upH64bZ9L-BORyin_y-HhHM2I/edit" target="_blank" class="btn">Open Pre-Production Form &rarr;</a>
                    <br>
                    <button class="restart-btn" onclick="restartScenario()">&#8635; Restart Scenario</button>
                </div>`;
        }

        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function makeProceeds(next) {
        const btn = document.createElement('button');
        btn.className = 'proceed-btn';
        btn.textContent = 'Proceed \u2192';
        if (next !== null) btn.addEventListener('click', () => render(next));
        return btn;
    }

    function restartScenario() {
        pathTaken.length = 0;
        breadcrumb.innerHTML = '';
        render(0);
    }

    render(0);

    const toggle = document.getElementById('mobile-menu');
    if (toggle) {
        toggle.addEventListener('click', () => {
            document.querySelector('.nav-list').classList.toggle('active');
            toggle.classList.toggle('is-active');
        });
    }
    </script>
</body>
</html>
